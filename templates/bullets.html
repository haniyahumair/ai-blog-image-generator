<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      width: 1080px;
      height: 1080px;
      background: #111111;
      font-family: 'Arial', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      width: 100%;
      height: 100%;
      padding: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .tag {
      color: #888;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 20px;
    }

    .headline {
      color: #ffffff;
      font-size: 48px;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 48px;
    }

    .bullet {
      display: flex;
      align-items: flex-start;
      margin-bottom: 24px;
      gap: 20px;
    }

    .bullet-dot {
      width: 10px;
      height: 10px;
      background: #ffffff;
      border-radius: 50%;
      margin-top: 10px;
      flex-shrink: 0;
    }

    .bullet-text {
      color: #cccccc;
      font-size: 28px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="tag">{{theme}}</p>
    <h1 class="headline">{{headline}}</h1>
    <div class="bullets">
      {{bullets}}
    </div>
  </div>
</body>
</html>
